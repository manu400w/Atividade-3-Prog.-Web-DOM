<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade 3 - Prog. Web</title>
</head>
<body>
    <h1>Atividade sobre o DOM: conceitos básicos</h1>

    <h2>Contador</h2>
    <span id="contador">0</span> <br>
    <button id="incrementa">+</button>
    <button id="decrementa">-</button>
    
    <hr>

    <h2>Texto dinâmico</h2>
    <input type="text" id="texto" placeholder="Digite o texto aqui.">
    <p id="paragrafo"></p>

    <hr>

    <h2>Contador de caracteres</h2>
    <input type="text" id="input" placeholder="Digite o texto aqui.">
    <p>Número de caracteres (sem espaços): <span id="contadorResultado">0</span></p>

    <hr>
    <h2>Listas - Adicionar itens</h2>
    <select id="tipoLista">
        <option value="">Escolha uma opção</option>
        <option value="ul">Lista não ordenada</option>
        <option value="ol">Lista ordenada</option>
    </select>
    <button id="btnLista">Adicionar item</button>
    <div id="listas"></div>
    <br>
    <button id="reset">Resetar página</button>

    <script src="script.js"></script>
</body>
</html>
